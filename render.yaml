services:
  - type: web
    name: styleflow-bd-agent
    runtime: node
    plan: free
    region: singapore
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    renderSubdomainPolicy: enabled
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: TAVILY_API_KEY
        sync: false
      - key: MEMORY_DB_PATH
        value: ./data/memory.db
      - key: MEMORY_SUMMARY_TRIGGER_TOKENS
        value: 6000
      - key: MEMORY_RECENT_MESSAGES_TO_KEEP
        value: 12
