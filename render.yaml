services:
  - type: web
    name: styleflow-bd-agent
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm --prefix frontend ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    renderSubdomainPolicy: enabled
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: TAVILY_API_KEY
        sync: false
      - key: MEMORY_DB_PATH
        value: ./data/memory.db
      - key: MEMORY_SUMMARY_TRIGGER_TOKENS
        value: 6000
      - key: MEMORY_RECENT_MESSAGES_TO_KEEP
        value: 12
